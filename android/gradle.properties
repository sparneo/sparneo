# Heap Gradle borné pour tenir sur une machine de 8 Go de RAM : -Xmx8G/-XX:MaxMetaspaceSize=4G
# faisaient dépasser la RAM totale (7,7 Go) → la JVM Gradle était tuée par l'OOM killer
# pendant `flutter build apk` (plusieurs crashs). 3 Go de heap + 1 Go de metaspace suffisent
# largement au build (validé : un build debug tient sous ~1,5 Go de pic).
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError

# Le démon Kotlin est une JVM SÉPARÉE, non couverte par org.gradle.jvmargs ci-dessus.
# Non borné il réserve 1-2 Go supplémentaires → c'est lui qui faisait souvent déborder
# la RAM co-résidente (Gradle + Kotlin + VSCode/Dart analyzer). On le plafonne aussi.
kotlin.daemon.jvmargs=-Xmx1G -XX:MaxMetaspaceSize=512m

# Machine 4 cœurs / 8 Go : on limite les workers parallèles pour éviter plusieurs
# processus de compilation concurrents qui empilent leurs pics mémoire.
org.gradle.workers.max=2
org.gradle.parallel=false

android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
